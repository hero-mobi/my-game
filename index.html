<!DOCTYPE html>
<html>
<head>
    <title>ГЕРОИ</title>
</head>
<body>

<h1>Золото: <span id="gold">0</span></h1>

<button onclick="mineGold()">Добыть золото</button>

<script>
let gold = 0;

// Кнопка
function mineGold() {
    gold = gold + 1;
    updateGold();
}

// Автодобыча каждую секунду
setInterval(function() {
    gold = gold + 1;
    updateGold();
}, 1000);

// Обновление текста
function updateGold() {
    document.getElementById("gold").innerText = gold;
}
</script>

</body>
</html>
